name: Release

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, labeled, unlabeled, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag_version.outputs.new_tag }}
      changelog: ${{ steps.tag_version.outputs.changelog }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get bump label
        id: bump_label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # On PR: read labels directly from the event payload
            LABEL=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' \
              | jq -r '.[] | select(startswith("bump:")) | ltrimstr("bump:")' | head -1)
          else
            # On push to main after merge: look up the PR by the merge commit SHA
            PR_NUMBER=$(gh pr list --state merged --base main \
              --json number,mergeCommit \
              --jq ".[] | select(.mergeCommit.oid == \"${{ github.sha }}\") | .number")
            if [ -n "$PR_NUMBER" ]; then
              LABEL=$(gh pr view "$PR_NUMBER" --json labels \
                --jq '.labels[].name | select(startswith("bump:")) | ltrimstr("bump:")' | head -1)
            fi
          fi
          echo "label_value=${LABEL:-patch}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ steps.bump_label.outputs.label_value }}
          dry_run: ${{ github.event_name == 'pull_request' }}
          tag_prefix: v

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: version
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -ldflags "-s -w -X github.com/justanoobcoder/tmux-mgr/cmd.version=${{ needs.version.outputs.new_tag }}" \
            -o "tmux-mgr-${{ needs.version.outputs.new_tag }}-${{ matrix.goos }}-${{ matrix.goarch }}" \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: tmux-mgr-${{ matrix.goos }}-${{ matrix.goarch }}
          path: tmux-mgr-${{ needs.version.outputs.new_tag }}-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    name: Publish release
    needs: [version, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.new_tag }}
          name: {{ needs.version.outputs.new_tag }}
          generateReleaseNotes: true
          artifacts: "dist/*"
